# Local dev dependencies for the goAML platform.
# Phase 1: Postgres only. Phase 6 starts using LocalStack (Secrets Manager) and adds Redis
# (per-tenant goAML B2B token cache). S3/SES come online in Phase 8/10.
# Run for the full test suite: `docker compose up -d postgres localstack redis`.
services:
  postgres:
    image: postgres:16-alpine
    container_name: goaml-postgres
    environment:
      POSTGRES_DB: goaml
      POSTGRES_USER: goaml
      POSTGRES_PASSWORD: goaml
    ports:
      - "5432:5432"
    volumes:
      - goaml-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goaml -d goaml"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:3
    container_name: goaml-localstack
    environment:
      SERVICES: s3,secretsmanager,kms,ses
      AWS_DEFAULT_REGION: me-central-1
      DEBUG: 0
    ports:
      - "4566:4566"
    volumes:
      - goaml-localstack:/var/lib/localstack

  redis:
    image: redis:7-alpine
    container_name: goaml-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  goaml-pg:
  goaml-localstack:
