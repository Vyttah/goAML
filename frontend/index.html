<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content-Security-Policy (recommended for PRODUCTION serving — see README "Content-Security-Policy").
      Intentionally NOT enabled here as a <meta> tag: Vite's dev server injects inline scripts + uses
      eval/WebSocket for HMR, which a strict script-src would break, and a meta CSP cannot be relaxed
      per-environment. Serve this header from the jar / ingress in prod instead. AntD requires
      'unsafe-inline' for style-src (runtime style injection); connect-src must include the API origin
      when VITE_API_BASE_URL targets a remote backend.

      <meta http-equiv="Content-Security-Policy"
            content="default-src 'self';
                     script-src 'self';
                     style-src 'self' 'unsafe-inline';
                     img-src 'self' data:;
                     font-src 'self' data:;
                     connect-src 'self';
                     object-src 'none';
                     frame-ancestors 'none';
                     base-uri 'self';
                     form-action 'self'" />
    -->
    <title>goAML — Regulatory Reporting</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
