# Test-only overrides (merged over src/main/resources/application.yml; properties win on conflicts).
# The 'test' profile is active for the whole suite: JwtService tolerates the committed default
# goaml.jwt.secret only under dev/test/local (B2 — it refuses to boot with the default in prod), so
# @SpringBootTest contexts that don't set GOAML_JWT_SECRET need a non-prod profile to start.
spring.profiles.active=test
# Keep the Phase 9 background poller OFF by default in tests so it never fires on the @Scheduled timer
# during a @SpringBootTest. The poller's own tests invoke the poll method directly (and may re-enable it).
goaml.scheduler.status-poll.enabled=false
