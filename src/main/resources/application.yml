# goAML platform — application configuration.
# Phase 1 baseline. Multi-tenancy + security wiring lands in Phase 2.
spring:
  application:
    name: goaml
  datasource:
    url:      ${GOAML_DATASOURCE_URL:jdbc:postgresql://localhost:5432/goaml}
    username: ${GOAML_DATASOURCE_USERNAME:postgres}
    password: ${GOAML_DATASOURCE_PASSWORD:password}
  jpa:
    hibernate:
      # Flyway is the source of truth for both shared and per-tenant schemas;
      # 'validate' is incompatible with tenant-scoped entities at startup (their
      # tables only exist in tenant_<id> schemas, never in public).
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
      # Schema-per-tenant multi-tenancy (Phase 2 sub-step 2.2). The connection provider
      # (SchemaMultiTenantConnectionProvider) sets Postgres search_path per session;
      # TenantIdentifierResolver pulls the current tenant from TenantContext.
      hibernate.multiTenancy: SCHEMA
  flyway:
    enabled: true
    locations: classpath:db/migration/shared
    schemas: public
  data:
    redis:
      # Caches per-tenant goAML B2B session tokens (Phase 6.2). docker-compose `redis` on :6379.
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  servlet:
    multipart:
      # Phase 11 imports (goAML XML / DPMSR CSV) + Phase 8 attachments. Raise the 1 MB default so valid
      # uploads aren't rejected; the per-file/total caps still apply (PackagingLimits at submit, max-rows
      # for CSV). Keep generous but bounded.
      max-file-size: ${GOAML_MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${GOAML_MULTIPART_MAX_REQUEST_SIZE:15MB}
  # Phase 12: Spring AI MCP server. Exposes the goAML lifecycle as MCP @Tool methods over an HTTP/SSE
  # (streamable) transport so Claude can drive build/validate/submit safely. The endpoint paths are set
  # explicitly under /api/v1/mcp/ (the `base-url` prefix property is NOT honored for the WebMvc SSE route
  # in this Spring AI version, but sse-endpoint/sse-message-endpoint ARE). Namespacing under /api means the
  # existing /api/** security rule + JwtAuthFilter authenticate every MCP call exactly like a REST call
  # (tenant + RBAC parity). Only the tool capability is enabled. SYNC = servlet (WebMvc SSE) execution.
  ai:
    mcp:
      server:
        enabled: ${GOAML_MCP_ENABLED:true}
        name: goaml-mcp
        version: 0.1.0
        type: SYNC
        sse-endpoint: /api/v1/mcp/sse
        sse-message-endpoint: /api/v1/mcp/message
        instructions: >-
          goAML MCP server for UAE FIU AML reporting. Read/build/validate/preview tools are safe;
          submission is human-gated (validate-first, dry-run, MLRO-confirmed). Call goaml_whoami first
          to confirm your tenant and role before acting.
        capabilities:
          tool: true
          resource: false
          prompt: false
          completion: false

server:
  port: 8080
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
      group:
        readiness:
          include: db,readinessState
  # Phase 14: enable the Prometheus scrape endpoint explicitly. The specific key is honored even in tests,
  # where Spring Boot otherwise disables metrics export by default (management.defaults.metrics.export).
  prometheus:
    metrics:
      export:
        enabled: true

goaml:
  auth:
    # Phase 1.5 — which authentication on-ramps this deployment exposes:
    #   native    — only POST /api/v1/auth/login (the standalone default; pre-1.5 behaviour).
    #   federated — only POST /api/v1/auth/federated/token (suite token-exchange); native login is off.
    #   both      — suite deployments that allow direct logins AND token-exchange.
    mode: ${GOAML_AUTH_MODE:native}
    # B14 — in-memory fixed-window throttle on POST /api/v1/auth/login + /auth/federated/token, keyed by
    # (client IP + email/source). Over the limit in a window → 429. Per-instance (no shared infra); with N
    # replicas the effective limit is limit×N, which is acceptable for this control.
    rate-limit:
      max-attempts-per-window: ${GOAML_AUTH_RATE_LIMIT_MAX:10}
      window: ${GOAML_AUTH_RATE_LIMIT_WINDOW:PT1M}   # ISO-8601 duration (PT1M = 1 minute)
  jwt:
    # Dev fallback only — in Phase 6 the signing key is sourced from AWS Secrets Manager.
    # HS256 requires ≥ 256 bits of entropy (32 random bytes). Replace per environment.
    secret: ${GOAML_JWT_SECRET:dev-secret-please-replace-with-a-long-random-value-min-256-bits}
    issuer: goaml
    access-token-ttl-minutes: 15
  aws:
    # AWS region for Secrets Manager (per-tenant goAML B2B credentials). me-central-1 = UAE.
    region: ${GOAML_AWS_REGION:me-central-1}
    # Endpoint override for LocalStack (docker-compose, :4566). Leave EMPTY for real AWS — the SDK
    # then resolves the regional endpoint and uses IRSA / the default credentials chain on EKS.
    endpoint: ${GOAML_AWS_ENDPOINT:}
    s3:
      # Bucket holding report attachments (Phase 8); per-tenant key prefixes. Create it once locally:
      # `aws --endpoint-url http://localhost:4566 s3 mb s3://goaml-attachments`.
      bucket: ${GOAML_S3_BUCKET:goaml-attachments}
  tenant:
    # A2: on boot, run the per-tenant Flyway against every ACTIVE tenant schema (before serving traffic)
    # so a tenant provisioned before a later tenant migration is brought up to date. Fail-fast: a migration
    # failure blocks startup. Idempotent (already-current schemas no-op). Set false only in tests that don't
    # want the boot-time sweep.
    migrate-on-startup: ${GOAML_TENANT_MIGRATE_ON_STARTUP:true}
  b2b:
    # Lifetime of a cached goAML B2B session token in Redis. Re-auth happens on expiry or a 401.
    token-ttl: ${GOAML_B2B_TOKEN_TTL:20m}
  scheduler:
    # Phase 9: the background poller that refreshes FIU submission status across tenants.
    # B8 top-level master switch. The Helm chart injects GOAML_SCHEDULER_ENABLED=false on the web replicas
    # (and true on a single dedicated poller pod) so the FIU is polled exactly once per cycle. When false the
    # @Scheduled poll method no-ops on this instance.
    enabled: ${GOAML_SCHEDULER_ENABLED:true}
    status-poll:
      enabled: ${GOAML_SCHEDULER_STATUS_POLL_ENABLED:true}
      # ISO-8601 duration — @Scheduled(fixedDelayString) accepts ISO-8601 or millis, NOT the "5m" suffix.
      interval: ${GOAML_SCHEDULER_STATUS_POLL_INTERVAL:PT5M}  # delay between poll cycles (PT5M = 5 min)
    retry:
      max-attempts: ${GOAML_SCHEDULER_RETRY_MAX_ATTEMPTS:3}   # attempts per FIU call (transient only)
      backoff: ${GOAML_SCHEDULER_RETRY_BACKOFF:2s}            # fixed delay between attempts (bound only)
  notifications:
    # Phase 10: report-transition notifications (in-app + SES email). In-app is always written;
    # email is gated OFF by default and stays off until a verified SES sender identity exists.
    email:
      enabled: ${GOAML_NOTIFICATIONS_EMAIL_ENABLED:false}
      from: ${GOAML_NOTIFICATIONS_EMAIL_FROM:no-reply@goaml.vyttah.com}  # must be an SES-verified sender
  attachments:
    # B15: anti-malware scanning of uploaded attachments. Magic-byte sniffing (reject executables +
    # declared-vs-actual content-type mismatch) ALWAYS runs. The pluggable AttachmentScanner (ClamAV/
    # GuardDuty/etc.) is OFF by default so the product runs with no AV infra; flip to true once a real
    # scanner bean is wired for production.
    av:
      enabled: ${GOAML_ATTACHMENTS_AV_ENABLED:false}
  ingestion:
    # Phase 11: file import (goAML XML + DPMSR CSV). Synchronous, so the row cap bounds in-request work.
    max-rows: ${GOAML_INGESTION_MAX_ROWS:500}   # max CSV data rows per upload; larger files are rejected
  web:
    # Phase 13: CORS allow-list for /api/** (comma-separated origins). Blank in prod (SPA is served
    # same-origin from the jar → no CORS). Set to the SPA dev-server origin only when it calls a remote
    # backend, e.g. http://localhost:5173.
    allowed-origins: ${GOAML_ALLOWED_ORIGINS:}
  dev:
    # LOCAL ONLY — on startup, seed a demo tenant + ready login users so the SPA is reviewable without
    # the provisioning chicken-and-egg. NEVER enable in a deployed environment. See config/dev/DevDataSeeder.
    seed:
      enabled: ${GOAML_DEV_SEED:false}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{correlationId:-}] %logger{36} - %msg%n"
