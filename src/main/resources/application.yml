# goAML platform — application configuration.
# Phase 1 baseline. Multi-tenancy + security wiring lands in Phase 2.
spring:
  application:
    name: goaml
  datasource:
    url:      ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/goaml}
    username: ${SPRING_DATASOURCE_USERNAME:goaml}
    password: ${SPRING_DATASOURCE_PASSWORD:goaml}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration/shared
    schemas: public

server:
  port: 8080
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
      group:
        readiness:
          include: db,readinessState

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{correlationId:-}] %logger{36} - %msg%n"
