# goAML platform — application configuration.
# Phase 1 baseline. Multi-tenancy + security wiring lands in Phase 2.
spring:
  application:
    name: goaml
  datasource:
    url:      ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/goaml}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
  jpa:
    hibernate:
      # Flyway is the source of truth for both shared and per-tenant schemas;
      # 'validate' is incompatible with tenant-scoped entities at startup (their
      # tables only exist in tenant_<id> schemas, never in public).
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
      # Schema-per-tenant multi-tenancy (Phase 2 sub-step 2.2). The connection provider
      # (SchemaMultiTenantConnectionProvider) sets Postgres search_path per session;
      # TenantIdentifierResolver pulls the current tenant from TenantContext.
      hibernate.multiTenancy: SCHEMA
  flyway:
    enabled: true
    locations: classpath:db/migration/shared
    schemas: public
  data:
    redis:
      # Caches per-tenant goAML B2B session tokens (Phase 6.2). docker-compose `redis` on :6379.
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

server:
  port: 8080
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
      group:
        readiness:
          include: db,readinessState

goaml:
  jwt:
    # Dev fallback only — in Phase 6 the signing key is sourced from AWS Secrets Manager.
    # HS256 requires ≥ 256 bits of entropy (32 random bytes). Replace per environment.
    secret: ${GOAML_JWT_SECRET:dev-secret-please-replace-with-a-long-random-value-min-256-bits}
    issuer: goaml
    access-token-ttl-minutes: 15
  aws:
    # AWS region for Secrets Manager (per-tenant goAML B2B credentials). me-central-1 = UAE.
    region: ${GOAML_AWS_REGION:me-central-1}
    # Endpoint override for LocalStack (docker-compose, :4566). Leave EMPTY for real AWS — the SDK
    # then resolves the regional endpoint and uses IRSA / the default credentials chain on EKS.
    endpoint: ${GOAML_AWS_ENDPOINT:}
    s3:
      # Bucket holding report attachments (Phase 8); per-tenant key prefixes. Create it once locally:
      # `aws --endpoint-url http://localhost:4566 s3 mb s3://goaml-attachments`.
      bucket: ${GOAML_S3_BUCKET:goaml-attachments}
  b2b:
    # Lifetime of a cached goAML B2B session token in Redis. Re-auth happens on expiry or a 401.
    token-ttl: ${GOAML_B2B_TOKEN_TTL:20m}
  scheduler:
    # Phase 9: the background poller that refreshes FIU submission status across tenants.
    status-poll:
      enabled: ${GOAML_SCHEDULER_STATUS_POLL_ENABLED:true}
      interval: ${GOAML_SCHEDULER_STATUS_POLL_INTERVAL:5m}   # delay between poll cycles
    retry:
      max-attempts: ${GOAML_SCHEDULER_RETRY_MAX_ATTEMPTS:3}  # attempts per FIU call (transient only)
      backoff: ${GOAML_SCHEDULER_RETRY_BACKOFF:2s}           # fixed delay between attempts

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{correlationId:-}] %logger{36} - %msg%n"
