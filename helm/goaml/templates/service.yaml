apiVersion: v1
kind: Service
metadata:
  name: {{ include "goaml.fullname" . }}
  labels:
    {{- include "goaml.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "goaml.selectorLabels" . | nindent 4 }}
    # Route only to the request-serving pods, never the dedicated poller pod (poller.dedicated).
    goaml.io/role: web
