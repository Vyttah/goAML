{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "goaml.fullname" . }}
  labels:
    {{- include "goaml.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # One prefix rule serves the REST API, the SPA, and the MCP server (/api/v1/mcp/sse +
          # /api/v1/mcp/message). For the MCP SSE stream set the buffering/read-timeout annotations
          # (see values.yaml ingress.annotations).
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "goaml.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
