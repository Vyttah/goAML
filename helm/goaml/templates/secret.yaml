{{- if and .Values.secret.create (not .Values.secret.existingSecret) (not .Values.externalSecret.enabled) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "goaml.secretName" . }}
  labels:
    {{- include "goaml.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $val := .Values.secret.data }}
  {{- if $val }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
  {{- end }}
{{- end }}
