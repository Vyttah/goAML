# goAML Helm values. Override per environment (e.g. -f values-prod.yaml).
replicaCount: 2

image:
  repository: goaml
  # tag defaults to .Chart.AppVersion when empty (set to the immutable image digest/tag in CD).
  tag: ""
  pullPolicy: IfNotPresent
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  # IRSA: grant AWS access (Secrets Manager / S3 / SES) without static keys, e.g.
  #   eks.amazonaws.com/role-arn: arn:aws:iam::<account>:role/goaml
  annotations: {}

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true   # /tmp is mounted writable (emptyDir) by the Deployment
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  # The `/` rule already routes the REST API, the SPA, AND the MCP server (served at /api/v1/mcp/sse +
  # /api/v1/mcp/message — Phase 12). The MCP transport is Server-Sent Events (a long-lived stream), so on
  # nginx-ingress disable response buffering and raise the read timeout, e.g.:
  #   nginx.ingress.kubernetes.io/proxy-buffering: "off"
  #   nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  annotations: {}
  host: goaml.example.com
  tls:
    enabled: true
    secretName: goaml-tls

resources:
  requests:
    cpu: 250m
    memory: 768Mi
  limits:
    memory: 1536Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 75

# Submission-status poller (Phase 9). The poller has NO distributed lock by design — it is only safe to
# run on ONE replica, otherwise N replicas each call the FIU per cycle (rate-limit / IP-reputation risk
# with a regulator) and fire duplicate author+MLRO notifications. The main Deployment defaults to ≥2
# replicas (+HPA), so the poller must NOT run there once you scale out.
#
# Recommended topology for any multi-replica install: set poller.dedicated=true. That (a) disables the
# scheduler on the main Deployment (GOAML_SCHEDULER_ENABLED=false) and (b) renders a separate single-replica
# poller Deployment (no HPA) with the scheduler enabled — so exactly one process polls.
#
# scheduler.enabled is passed to the app as the GOAML_SCHEDULER_ENABLED env var; the Java @Scheduled poller
# must honour it (see docs/16-operations-dr-retention.md "Poller topology" + the G3 note in
# .planning/reviews/e2e-audit-remediation-progress.md).
scheduler:
  # Whether the MAIN Deployment runs the poller. Auto-forced to false when poller.dedicated=true.
  enabled: true

poller:
  # When true: main Deployment runs with the scheduler OFF; a dedicated single-replica poller Deployment
  # (scheduler ON) is rendered. Use this whenever replicaCount>1 or autoscaling.enabled=true.
  dedicated: false
  # Resources for the dedicated poller pod (smaller than the request-serving pods).
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1024Mi

# PodDisruptionBudget — keep at least one pod up during voluntary disruptions (node drains, rollouts).
pdb:
  enabled: true
  minAvailable: 1

# NetworkPolicy — default-deny ingress, then allow the ingress controller (app traffic) and Prometheus
# (metrics scrape). Off by default so a cluster without a CNI that enforces NetworkPolicy isn't silently
# "secured". Adjust the selectors to match your ingress-controller / monitoring namespaces+labels.
networkPolicy:
  enabled: false
  # Namespace label selector for the ingress controller (e.g. ingress-nginx).
  ingressControllerNamespaceLabels:
    kubernetes.io/metadata.name: ingress-nginx
  # Namespace label selector for the Prometheus/monitoring stack.
  monitoringNamespaceLabels:
    kubernetes.io/metadata.name: monitoring

# ServiceMonitor for the Prometheus Operator (scrapes /actuator/prometheus). Off by default — only render
# it where the Prometheus Operator CRDs are installed.
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  path: /actuator/prometheus
  # Extra labels so the cluster's Prometheus selects this ServiceMonitor (e.g. release: kube-prometheus-stack).
  labels: {}

# PrometheusRule (Prometheus Operator) — submission-pipeline alerts. Off by default — only render it where
# the Prometheus Operator CRDs are installed. Thresholds are starting points; tune per environment.
# NOTE: the poller-error alert uses goaml_poller_errors_total — the Micrometer counter goaml.poller.errors
# is added by the application (Wave 3 / G3). Until that ships the rule simply never fires (absent metric).
prometheusRule:
  enabled: false
  # Extra labels so the cluster's Prometheus selects this PrometheusRule (e.g. release: kube-prometheus-stack).
  labels: {}
  rules:
    pollerErrorsWindow: 15m
    http5xxWindow: 5m
    http5xxRatio: "0.05"        # alert when >5% of requests are 5xx over the window
    readinessFlapWindow: 10m
    readinessFlapCount: "3"     # alert after 3 readiness transitions in the window
    absentScrapeWindow: 5m      # alert when the target stops being scraped (proxy for "poller not running")

# Non-secret env → rendered into a ConfigMap and injected via envFrom.
config:
  SPRING_PROFILES_ACTIVE: "prod"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://goaml-postgres:5432/goaml"
  SPRING_DATASOURCE_USERNAME: "goaml"
  SPRING_DATA_REDIS_HOST: "goaml-redis"
  SPRING_DATA_REDIS_PORT: "6379"
  GOAML_AWS_REGION: "me-central-1"
  GOAML_AWS_ENDPOINT: ""           # empty = real AWS (SDK resolves the regional endpoint + IRSA)
  GOAML_S3_BUCKET: "goaml-attachments"
  GOAML_ALLOWED_ORIGINS: ""        # blank: SPA is served same-origin from the jar (no CORS)

# Secret env (GOAML_JWT_SECRET, SPRING_DATASOURCE_PASSWORD). Pick ONE strategy:
#  1) externalSecret.enabled=true → an ExternalSecret (External Secrets Operator) syncs from AWS → a Secret
#  2) secret.create=true          → a chart-managed Secret from secret.data (dev/test only; do not commit prod values)
#  3) secret.existingSecret=<name> → reference a Secret created out-of-band
secret:
  create: false
  existingSecret: ""
  data:
    GOAML_JWT_SECRET: ""
    SPRING_DATASOURCE_PASSWORD: ""

externalSecret:
  enabled: false
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secrets
    kind: ClusterSecretStore
  data:
    - secretKey: GOAML_JWT_SECRET
      remoteRef:
        key: goaml/app
        property: jwt-secret
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: goaml/app
        property: db-password

probes:
  liveness:
    path: /actuator/health/liveness
  readiness:
    path: /actuator/health/readiness
  # generous startup window so a slow first boot (Flyway migrate) doesn't get killed
  startupFailureThreshold: 30

nodeSelector: {}
tolerations: []
affinity: {}
