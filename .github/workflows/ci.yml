name: CI

# Backend + frontend gates on every push/PR. Mirrors the local gates exactly.
on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (test + JaCoCo gate)
    runs-on: ubuntu-latest
    # C6: provide Redis so the Phase 6 Redis integration tests actually run instead of self-skipping
    # via assumeTrue(reachable). The IT connects to localhost:6379 (the runner-mapped service port).
    #
    # NOTE (LocalStack): the S3/Secrets/SES ITs also self-skip when LocalStack is absent. They are NOT
    # enabled here on purpose — they need buckets/secrets seeded before they can pass, so wiring them
    # into the default gate risks flaky red builds. Track them in a dedicated nightly job that runs
    # `docker compose up -d localstack` + the seeding steps from docs/03 before re-enabling.
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      # Testcontainers uses the runner's bundled Docker; Redis is provided as a service container above.
      - name: Test + coverage gate
        run: ./gradlew --no-daemon test jacocoTestCoverageVerification
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: build/reports/tests/test
          if-no-files-found: ignore

  frontend:
    name: Frontend (typecheck + lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
