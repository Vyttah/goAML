name: CD

# Runs ONLY after CI succeeds on main (C4: deploy is gated on the test/coverage gate, so a red main
# never builds/pushes/deploys). On success it always builds the production image (validates the
# Dockerfile); ECR push + helm-upgrade to EKS are additionally GATED on AWS secrets being present, so
# this is inert until an account/cluster is wired.
#
# Required repo secrets/vars to enable deploy:
#   AWS_ROLE_ARN     (OIDC role to assume)        AWS_REGION
#   ECR_REPOSITORY   (e.g. 123.dkr.ecr.<region>.amazonaws.com/goaml)
#   EKS_CLUSTER      (cluster name)
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write       # for AWS OIDC
  security-events: write # for the Trivy SARIF upload

jobs:
  image:
    name: Build image (+ scan + gated deploy)
    runs-on: ubuntu-latest
    # Only proceed when the triggering CI run went green.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      # The image is tagged with the commit CI actually validated (the workflow_run head sha).
      IMAGE_SHA: ${{ github.event.workflow_run.head_sha }}
      # Secrets can't be used directly in `if:`; map presence to a plain string here.
      DEPLOY_ENABLED: ${{ secrets.AWS_ROLE_ARN != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/setup-buildx-action@v3

      # Always build (and load) the image so the Dockerfile is exercised on every successful CI run.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: goaml:${{ env.IMAGE_SHA }}

      # ---- vulnerability scan (C4) ----
      # Fails the run on HIGH/CRITICAL OS+library vulns so a vulnerable image is never pushed.
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: goaml:${{ env.IMAGE_SHA }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # ---- gated deploy (only when AWS secrets exist) ----
      - name: Configure AWS credentials
        if: env.DEPLOY_ENABLED == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: env.DEPLOY_ENABLED == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag + push image to ECR
        if: env.DEPLOY_ENABLED == 'true'
        run: |
          docker tag goaml:${{ env.IMAGE_SHA }} ${{ secrets.ECR_REPOSITORY }}:${{ env.IMAGE_SHA }}
          docker tag goaml:${{ env.IMAGE_SHA }} ${{ secrets.ECR_REPOSITORY }}:latest
          docker push ${{ secrets.ECR_REPOSITORY }}:${{ env.IMAGE_SHA }}
          docker push ${{ secrets.ECR_REPOSITORY }}:latest

      - name: Set up Helm
        if: env.DEPLOY_ENABLED == 'true'
        uses: azure/setup-helm@v4

      - name: Deploy to EKS
        if: env.DEPLOY_ENABLED == 'true'
        run: |
          aws eks update-kubeconfig --name "${{ secrets.EKS_CLUSTER }}" --region "${{ secrets.AWS_REGION }}"
          helm upgrade --install goaml ./helm/goaml \
            --namespace goaml --create-namespace \
            --set image.repository="${{ secrets.ECR_REPOSITORY }}" \
            --set image.tag="${{ env.IMAGE_SHA }}" \
            --wait --timeout 5m

      - name: Deploy skipped (no AWS secrets)
        if: env.DEPLOY_ENABLED != 'true'
        run: echo "AWS_ROLE_ARN not set — built + scanned the image only. Configure AWS secrets to enable ECR push + EKS deploy."
